<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="1000" height="650">
    <rect width="1000" height="650" fill="#f8f9fa"/>

    <!-- Title -->
    <text x="500" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1a1a2e">What Happens When You Type https://www.google.com</text>

    <!-- HTTPS Encrypted Zone -->
    <rect x="230" y="160" width="530" height="30" fill="#d4edda" stroke="#28a745" stroke-width="1" rx="4"/>
    <text x="495" y="179" text-anchor="middle" font-family="Arial" font-size="12" fill="#155724">Encrypted HTTPS Traffic (TLS/SSL) - Port 443</text>

    <!-- Browser Box -->
    <rect x="420" y="55" width="160" height="60" fill="#2196F3" stroke="#1565C0" stroke-width="2" rx="8"/>
    <text x="500" y="81" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Browser</text>
    <text x="500" y="101" text-anchor="middle" font-family="Arial" font-size="12" fill="white">www.google.com</text>

    <!-- DNS Server Box -->
    <rect x="50" y="210" width="140" height="60" fill="#9C27B0" stroke="#6A1B9A" stroke-width="2" rx="8"/>
    <text x="120" y="236" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">DNS Server</text>
    <text x="120" y="256" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Name Resolution</text>

    <!-- Firewall Box -->
    <rect x="250" y="210" width="140" height="60" fill="#FF5722" stroke="#BF360C" stroke-width="2" rx="8"/>
    <text x="320" y="236" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Firewall</text>
    <text x="320" y="256" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Security Check</text>

    <!-- Load Balancer Box -->
    <rect x="450" y="210" width="140" height="60" fill="#FF9800" stroke="#E65100" stroke-width="2" rx="8"/>
    <text x="520" y="236" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Load Balancer</text>
    <text x="520" y="256" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Traffic Distribution</text>

    <!-- Web Server Box -->
    <rect x="650" y="210" width="140" height="60" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" rx="8"/>
    <text x="720" y="236" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Web Server</text>
    <text x="720" y="256" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Nginx/Apache</text>

    <!-- App Server Box -->
    <rect x="450" y="390" width="140" height="60" fill="#009688" stroke="#00695C" stroke-width="2" rx="8"/>
    <text x="520" y="416" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">App Server</text>
    <text x="520" y="436" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Business Logic</text>

    <!-- Database Box -->
    <rect x="650" y="390" width="140" height="60" fill="#795548" stroke="#4E342E" stroke-width="2" rx="8"/>
    <text x="720" y="416" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Database</text>
    <text x="720" y="436" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Data Storage</text>

    <!-- Arrows -->
    <!-- Browser to DNS -->
    <line x1="420" y1="85" x2="190" y2="215" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="285" y="148" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">1. DNS Query</text>

    <!-- DNS to Browser (return) -->
    <line x1="190" y1="230" x2="428" y2="98" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
    <text x="290" y="170" text-anchor="middle" font-family="Arial" font-size="11" fill="#9C27B0">2. IP Address</text>

    <!-- Browser to Firewall -->
    <line x1="465" y1="115" x2="370" y2="212" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="395" y="162" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">3. TCP/IP</text>

    <!-- Firewall to Load Balancer -->
    <line x1="390" y1="240" x2="450" y2="240" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="420" y="232" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">4.</text>

    <!-- Load Balancer to Web Server -->
    <line x1="590" y1="240" x2="650" y2="240" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="620" y="232" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">5.</text>

    <!-- Web Server to App Server -->
    <line x1="700" y1="270" x2="580" y2="392" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="660" y="335" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">6. Request</text>

    <!-- App Server to Database -->
    <line x1="590" y1="420" x2="650" y2="420" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="620" y="413" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">7. Query</text>

    <!-- Database to App Server -->
    <line x1="650" y1="435" x2="590" y2="435" stroke="#795548" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBrown)"/>
    <text x="620" y="450" text-anchor="middle" font-family="Arial" font-size="10" fill="#795548">8. Data</text>

    <!-- Flow description -->
    <rect x="30" y="490" width="940" height="145" fill="white" stroke="#dee2e6" stroke-width="1" rx="8"/>
    <text x="500" y="513" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Complete Request Flow</text>
    <text x="50" y="535" font-family="Arial" font-size="11" fill="#555">1. DNS Resolution: Browser asks DNS server to resolve www.google.com to IP address</text>
    <text x="50" y="552" font-family="Arial" font-size="11" fill="#555">2. TCP/IP Connection: Browser establishes TCP connection on port 443 (HTTPS)</text>
    <text x="50" y="569" font-family="Arial" font-size="11" fill="#555">3. HTTPS/SSL: TLS handshake to establish encrypted communication</text>
    <text x="50" y="586" font-family="Arial" font-size="11" fill="#555">4. Firewall: Security inspection of incoming traffic</text>
    <text x="50" y="603" font-family="Arial" font-size="11" fill="#555">5. Load Balancer: Distributes request to available web server</text>
    <text x="500" y="535" font-family="Arial" font-size="11" fill="#555">6. Web Server: Receives HTTP request, forwards to app server</text>
    <text x="500" y="552" font-family="Arial" font-size="11" fill="#555">7. Application Server: Executes business logic</text>
    <text x="500" y="569" font-family="Arial" font-size="11" fill="#555">8. Database: Retrieves required data</text>
    <text x="500" y="586" font-family="Arial" font-size="11" fill="#555">9. Response: Data flows back browser → renders page</text>

    <!-- Arrow markers -->
    <defs>
          <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
          </marker>
          <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="#9C27B0"/>
          </marker>
          <marker id="arrowBrown" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="#795548"/>
          </marker>
    </defs>
</svg>
